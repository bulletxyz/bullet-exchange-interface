name: Release-plz

on:
  push:
    branches: [main]

env:
  # Use the system git CLI for fetching git deps; libgit2 can fail on private/auth flows.
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

permissions:
  pull-requests: write
  contents: write
  id-token: write # required for crates.io OIDC trusted publishing

jobs:
  release-plz:
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Authenticate with crates.io
        id: cargo-auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ steps.cargo-auth.outputs.token }}
